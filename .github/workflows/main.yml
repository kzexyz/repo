name: Update Cydia Repo

on:
  push:
    branches:
      - main
    paths:
      - 'debs/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dpkg-dev
      run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2

    - name: Generate Packages and Packages.bz2
      run: |
        dpkg-scanpackages -m debs /dev/null > Packages
        bzip2 -fk Packages

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add Packages Packages.bz2
        git commit -m "Auto-update Packages [skip ci]" || exit 0
        git push
